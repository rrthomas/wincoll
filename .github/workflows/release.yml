name: Build release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  source-release:
    name: Make source release
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6
      - name: Install non-Python build dependencies
        run: sudo apt-get -y install gettext
      - name: Install Python dependencies
        run: pip install tox build chambercourt toml-cli
      - name: Build
        run: make dist
      - name: Make the release
        run: gh release create ${{ github.ref_name }} --title "Release ${{ github.ref_name}}" dist/*

  binary-release:
    name: Make binary release
    needs: source-release
    strategy:
      matrix:
        # Use oldest available Ubuntu for greatest compatibility of
        # resulting binary.
        os: [ubuntu-22.04, macos-latest, windows-latest, ubuntu-22.04-arm]
    runs-on: ${{ matrix.os }}
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install non-Python build dependencies (Ubuntu)
        if: ${{ matrix.os == 'ubuntu-22.04' || matrix.os == 'ubuntu-22.04-arm' }}
        run: sudo apt-get -y install gettext
      - name: Install non-Python build dependencies (macOS)
        if: ${{ matrix.os == 'macos-latest' }}
        run: |
          brew install make
          echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH
      - name: Install non-Python build dependencies (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        run: |
          nuget install Gettext.Tools -Version 0.22.4 -OutputDirectory c:\nuget;
          Add-Content $env:GITHUB_PATH "C:\nuget\Gettext.Tools.0.22.4\tools\bin";
          choco install wget zip
      - name: Install Python dependencies
        run: pip install tox build chambercourt toml-cli
      - name: Build
        run: make dist
      - name: Build the executable (Ubuntu)
        if: ${{ matrix.os == 'ubuntu-22.04' || matrix.os == 'ubuntu-22.04-arm' }}
        run: |
          pip install cx-Freeze
          cp ./wincoll/levels/app-icon.png .
          cxfreeze bdist_appimage
          ./dist/WinColl*.AppImage --help
          mv dist/WinColl*.AppImage dist/WinColl-${{ runner.arch }}.AppImage
      - name: Build the executable (macOS)
        if: ${{ matrix.os == 'macos-latest' }}
        run: |
          pip install pyinstaller
          ./make-macos-icns ./wincoll/levels/Hero.png wincoll.iconset
          pyi-makespec --windowed --name WinColl --icon wincoll.icns --copy-metadata wincoll --add-data "wincoll/levels:wincoll/levels" --add-data "wincoll/locale:wincoll/locale" --collect-all chambercourt wincoll/__main__.py
          export version=$(grep version pyproject.toml)
          sed -i '' -e "s/\(name='WinColl.app'\)/\1,\n    $version/" wincoll.spec
          PYTHONPATH=. pyinstaller --noconfirm wincoll.spec
          brew install create-dmg
          mkdir dmg-folder
          mv dist/wincoll.app dmg-folder/
          create-dmg --volname "WinColl ${{ github.ref_name }}" ./dist/wincoll-${{ runner.os }}-${{ runner.arch }}.dmg dmg-folder/
      - name: Build the executable (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        run: |
          pip install cx-Freeze Pillow
          python convert-image wincoll/levels/app-icon.png app-icon.ico
          cxfreeze bdist_msi
          mv dist/*.msi dist/wincoll-win64.msi
      - name: Upload the binary (Ubuntu)
        if: ${{ matrix.os == 'ubuntu-22.04' || matrix.os == 'ubuntu-22.04-arm' }}
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ github.token }}
          tag: ${{ github.ref }}
          file: ./dist/WinColl*.AppImage
          file_glob: true
      - name: Upload the binary (macOS)
        if: ${{ matrix.os == 'macos-latest' }}
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ github.token }}
          tag: ${{ github.ref }}
          file: ./dist/wincoll-*.dmg
          file_glob: true
      - name: Upload the binary (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ github.token }}
          tag: ${{ github.ref }}
          file: ./dist/wincoll*.msi
          file_glob: true
      - name: Build the RISC OS distribution
        if: ${{ matrix.os == 'ubuntu-22.04' }}
        run: ./dist-riscos
      - name: Upload the RISC OS distribution
        if: ${{ matrix.os == 'ubuntu-22.04' }}
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ github.token }}
          tag: ${{ github.ref }}
          file: ./dist/wincoll-riscos.zip
          file_glob: true
